  <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIM – Centro de Inteligência Meteorológica</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&family=Space+Mono&display=swap');

/* ── RESET ───────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ── TOKENS ──────────────────────── */
:root {
  --navy:    #07111d;
  --deep:    #0a1b2e;
  --blue:    #0d2845;
  --mid:     #163d6a;
  --accent:  #1a82b8;
  --sky:     #41aee3;
  --ice:     #a2d4ef;
  --white:   #eef3f8;
  --silver:  #7fa3bc;
  --steel:   #3e5f75;
  --warning: #e09c1c;
  --danger:  #d43626;
  --safe:    #1aa55a;
  --orange:  #d4621c;
  --cbr-red: #e8000e;
  --hd: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
  --bd: 'Barlow', Arial, sans-serif;
  --mn: 'Space Mono', 'Courier New', monospace;
}

body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--bd);
  font-size: 15px;
  line-height: 1.65;
}

/* ── LAYOUT ──────────────────────── */
.wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

/* ── UTILITIES ───────────────────── */
.mono  { font-family: var(--mn); }
.head  { font-family: var(--hd); }
.label {
  font-family: var(--mn);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.label::before { content: ''; width: 22px; height: 1px; background: var(--accent); }
.h2 {
  font-family: var(--hd);
  font-size: clamp(30px, 4vw, 50px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -.5px;
  color: var(--white);
}
.h2 b { color: var(--accent); font-weight: 700; }
.rule { width: 100%; height: 1px; background: linear-gradient(90deg, var(--accent) 0%, transparent 70%); }

/* pill tag */
.tag {
  display: inline-block;
  font-family: var(--mn);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 2px;
  border: 1px solid;
}
.tag-blue   { color: var(--sky);     border-color: var(--sky);     background: rgba(65,174,227,.09); }
.tag-green  { color: var(--safe);    border-color: var(--safe);    background: rgba(26,165,90,.09); }
.tag-yellow { color: var(--warning); border-color: var(--warning); background: rgba(224,156,28,.09); }
.tag-orange { color: var(--orange);  border-color: var(--orange);  background: rgba(212,98,28,.09); }
.tag-red    { color: var(--danger);  border-color: var(--danger);  background: rgba(212,54,38,.09); }

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar {
  background: #050e18;
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 7px 0;
}
.topbar-inner {
  display: flex; justify-content: space-between; align-items: center;
}
.topbar-left, .topbar-right {
  font-family: var(--mn);
  font-size: 10px;
  color: var(--silver);
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 20px;
}
.dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--safe);
  box-shadow: 0 0 6px var(--safe);
  display: inline-block;
}
/* CSS-only pulse */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(26,165,90,.7); }
  50%      { box-shadow: 0 0 0 5px rgba(26,165,90,0); }
}
.dot-live { animation: pulse 2.4s infinite; }

/* ══════════════════════════════════
   NAVBAR
══════════════════════════════════ */
nav {
  background: var(--deep);
  border-bottom: 1px solid rgba(255,255,255,.07);
  position: sticky; top: 0; z-index: 100;
}
.nav-inner {
  display: flex; align-items: center;
  justify-content: space-between;
  max-width: 1200px; margin: 0 auto;
  padding: 0 40px;
}
.nav-logo {
  display: flex; align-items: center; gap: 16px;
  text-decoration: none;
  padding: 12px 0;
}
/* CBR logo reproduced in SVG */
.cbr-logo-wrap { display: flex; align-items: center; }

.nav-brand { display: flex; flex-direction: column; }
.brand-name {
  font-family: var(--hd);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 4px;
  color: var(--white);
  line-height: 1;
}
.brand-sub {
  font-size: 9px;
  font-family: var(--mn);
  color: var(--silver);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.nav-links { display: flex; gap: 2px; }
.nav-a {
  font-family: var(--hd);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--silver);
  text-decoration: none;
  padding: 10px 13px;
  border-radius: 3px;
  transition: background .15s, color .15s;
}
.nav-a:hover { color: var(--white); background: rgba(255,255,255,.07); }
.nav-a.active { color: var(--accent); }
.nav-alert {
  font-family: var(--hd);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 8px 18px;
  border-radius: 3px;
  border: 1px solid var(--danger);
  color: var(--danger);
  text-decoration: none;
  transition: background .15s, color .15s;
}
.nav-alert:hover { background: var(--danger); color: #fff; }

/* ══════════════════════════════════
   TICKER
══════════════════════════════════ */
.ticker-bar {
  background: rgba(10,27,46,.95);
  border-bottom: 1px solid rgba(26,130,184,.18);
  overflow: hidden;
  position: relative;
  padding: 9px 0;
}
.ticker-wrap {
  display: flex; align-items: center;
  white-space: nowrap;
  animation: scroll-left 38s linear infinite;
}
.ticker-wrap:hover { animation-play-state: paused; }
@keyframes scroll-left {
  from { transform: translateX(100vw); }
  to   { transform: translateX(-100%); }
}
.ticker-lbl {
  font-family: var(--mn);
  font-size: 9px;
  letter-spacing: 2px;
  background: var(--accent);
  color: var(--navy);
  padding: 2px 10px;
  margin-right: 24px;
  border-radius: 2px;
  font-weight: 700;
}
.ticker-item {
  font-family: var(--mn);
  font-size: 10px;
  color: var(--ice);
  letter-spacing: .5px;
  padding: 0 28px;
  display: inline-flex; align-items: center; gap: 8px;
}
.t-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.t-red    { background: var(--danger); }
.t-yellow { background: var(--warning); }
.t-blue   { background: var(--sky); }

/* ══════════════════════════════════
   HERO
══════════════════════════════════ */
#home {
  position: relative;
  min-height: 90vh;
  display: flex; flex-direction: column; justify-content: center;
  overflow: hidden;
  background:
    radial-gradient(ellipse 70% 60% at 65% 45%, rgba(13,40,69,.95) 0%, transparent 70%),
    linear-gradient(160deg, var(--navy) 0%, var(--deep) 100%);
}

/* Pure CSS grid background */
.hero-grid-bg {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(26,130,184,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,130,184,.05) 1px, transparent 1px);
  background-size: 55px 55px;
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* CSS-only radar rings on right */
.radar-rings {
  position: absolute;
  right: 8%; top: 50%;
  transform: translateY(-50%);
  width: 480px; height: 480px;
  pointer-events: none;
}
.rr {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(26,130,184,.18);
  transform-origin: center;
  animation: rr-scale 5s ease-out infinite;
}
.rr:nth-child(1) { inset: 0%; }
.rr:nth-child(2) { inset: 15%; animation-delay: 1.7s; }
.rr:nth-child(3) { inset: 30%; animation-delay: 3.4s; border-color: rgba(26,130,184,.28); }
.rr:nth-child(4) { inset: 45%; animation-delay: 0s; border-color: rgba(26,130,184,.35); }
.rr:nth-child(5) { inset: 60%; animation-delay: .8s; border-color: rgba(26,130,184,.4); }
@keyframes rr-scale {
  0%   { opacity: 0; transform: scale(.5); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.1); }
}
/* radar cross */
.radar-rings::before,
.radar-rings::after {
  content: '';
  position: absolute;
  background: rgba(26,130,184,.08);
}
.radar-rings::before { top: 50%; left: 0; right: 0; height: 1px; }
.radar-rings::after  { left: 50%; top: 0; bottom: 0; width: 1px; }
.radar-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 16px var(--accent);
}

/* Hero sweep line — pure CSS conic */
.radar-sweep-wrap {
  position: absolute; inset: 0;
  border-radius: 50%;
  overflow: hidden;
  opacity: .25;
}
.radar-sweep-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    transparent 0%,
    rgba(26,130,184,.5) 14%,
    transparent 28%,
    transparent 100%
  );
  animation: sweep 5s linear infinite;
}
@keyframes sweep { to { transform: rotate(360deg); } }

.hero-content {
  position: relative; z-index: 5;
  padding: 60px 0;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 22px;
}
.eyebrow-line { width: 44px; height: 2px; background: var(--accent); }
.eyebrow-text {
  font-family: var(--mn);
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
}

h1.hero-h1 {
  font-family: var(--hd);
  font-size: clamp(52px, 8vw, 100px);
  font-weight: 800;
  line-height: .92;
  letter-spacing: -2px;
  color: var(--white);
  margin-bottom: 18px;
}
.h1-accent {
  /* CSS gradient text fallback via color */
  color: var(--sky);
}
.hero-sub {
  font-family: var(--hd);
  font-size: clamp(17px, 2vw, 24px);
  font-weight: 400;
  color: var(--silver);
  max-width: 560px;
  margin-bottom: 38px;
  line-height: 1.45;
  letter-spacing: .3px;
}
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-p {
  font-family: var(--hd);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 13px 30px;
  background: var(--accent);
  color: var(--navy);
  border: none; border-radius: 3px;
  text-decoration: none;
  display: inline-block;
  transition: background .15s, transform .15s;
}
.btn-p:hover { background: var(--sky); transform: translateY(-2px); }
.btn-s {
  font-family: var(--hd);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 13px 30px;
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 3px;
  text-decoration: none;
  display: inline-block;
  transition: border-color .15s, background .15s;
}
.btn-s:hover { border-color: var(--white); background: rgba(255,255,255,.06); }

/* hero stats bar */
.hero-stats {
  display: flex; gap: 0;
  margin-top: 56px;
  border-top: 1px solid rgba(255,255,255,.07);
  padding-top: 0;
}
.hstat {
  flex: 1;
  padding: 28px 32px;
  border-right: 1px solid rgba(255,255,255,.07);
  display: flex; flex-direction: column; gap: 5px;
}
.hstat:last-child { border-right: none; }
.hstat-num {
  font-family: var(--hd);
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  color: var(--white);
  letter-spacing: -1px;
}
.hstat-num span { color: var(--accent); }
.hstat-lbl {
  font-family: var(--mn);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--silver);
}

/* ══════════════════════════════════
   LIVE METRICS STRIP
══════════════════════════════════ */
.live-strip {
  background: var(--deep);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.live-grid {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  border-left: 1px solid rgba(255,255,255,.05);
}
.lcard {
  padding: 24px 28px;
  border-right: 1px solid rgba(255,255,255,.05);
  border-bottom: 1px solid rgba(255,255,255,.05);
  position: relative;
  transition: background .15s;
}
.lcard:hover { background: rgba(26,130,184,.05); }
.lcard::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent); transform: scaleX(0);
  transform-origin: left; transition: transform .25s;
}
.lcard:hover::before { transform: scaleX(1); }
.lc-icon { font-size: 20px; margin-bottom: 10px; display: block; }
.lc-lbl  { font-family: var(--mn); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--silver); margin-bottom: 6px; }
.lc-val  { font-family: var(--hd); font-size: 30px; font-weight: 700; color: var(--white); line-height: 1; }
.lc-val small { font-size: 14px; color: var(--silver); font-weight: 400; }
.lc-sub  { font-size: 11px; color: var(--silver); margin-top: 4px; }
.chg { font-size: 10px; font-family: var(--mn); }
.chg.up   { color: var(--danger); }
.chg.dn   { color: var(--safe); }
.chg.st   { color: var(--sky); }

/* ══════════════════════════════════
   SECTIONS — generic spacing
══════════════════════════════════ */
section { padding: 88px 0; }
section:nth-child(even) { background: var(--deep); }
section:nth-child(odd)  { background: var(--navy); }

/* override specific */
#home            { background: none; padding: 0; }
#home-events     { background: var(--navy); }
#about           { background: var(--deep); }
#monitoring      { background: var(--navy); }
#alerts          { background: var(--deep); }
#science         { background: var(--navy); }
#contact         { background: var(--deep); }

/* section dividers */
.sec-rule { height: 1px; background: linear-gradient(90deg, transparent, rgba(26,130,184,.18), transparent); }

/* ══════════════════════════════════
   EVENTS
══════════════════════════════════ */
.events-hdr {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 44px;
}
.see-all {
  font-family: var(--mn); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 6px;
}
.see-all::after { content: '→'; }
.see-all:hover { gap: 10px; }

.events-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.05);
}
.ecard {
  background: var(--deep);
  padding: 30px;
  position: relative;
  overflow: hidden;
  transition: background .15s;
}
.ecard:hover { background: #0f2a44; }
.ecard-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 18px;
}
.ecard-date {
  font-family: var(--mn); font-size: 9px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--steel);
}
.sev {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--mn); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
}
.sev-dot { width: 7px; height: 7px; border-radius: 50%; }
.sev-ext .sev-dot { background: var(--danger); box-shadow: 0 0 7px var(--danger); }
.sev-hi  .sev-dot { background: var(--orange); }
.sev-mod .sev-dot { background: var(--warning); }
.sev-lo  .sev-dot { background: var(--safe); }
.sev-ext { color: var(--danger); }
.sev-hi  { color: var(--orange); }
.sev-mod { color: var(--warning); }
.sev-lo  { color: var(--safe); }

.ecard h3 {
  font-family: var(--hd); font-size: 20px; font-weight: 700;
  color: var(--white); margin-bottom: 10px; line-height: 1.2;
}
.ecard p  { font-size: 13px; color: var(--silver); line-height: 1.6; margin-bottom: 16px; }
.emeta    { display: flex; gap: 14px; font-family: var(--mn); font-size: 9px; color: var(--steel); flex-wrap: wrap; }
.ecard-n  {
  position: absolute; bottom: 16px; right: 20px;
  font-family: var(--hd); font-size: 72px; font-weight: 800;
  color: rgba(255,255,255,.03); line-height: 1; user-select: none;
}
/* featured */
.ecard.feat {
  grid-column: span 3;
  display: grid; grid-template-columns: 1fr 1fr; gap: 44px; align-items: center;
  padding: 44px;
}
.ecard.feat h3 { font-size: 30px; }
.ecard.feat p  { font-size: 14px; }
.feat-visual {
  background: rgba(13,40,69,.6);
  border: 1px solid rgba(26,130,184,.15);
  border-radius: 6px;
  height: 240px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
/* CSS-only cyclone */
.cyclone {
  width: 180px; height: 180px;
  position: relative;
}
.cy-ring {
  position: absolute; border-radius: 50%; border: 1.5px solid rgba(65,174,227,.3);
  animation: cy-spin linear infinite;
}
.cy-ring:nth-child(1) { inset: 0;  animation-duration: 10s; }
.cy-ring:nth-child(2) { inset: 18px; animation-duration: 7.5s; animation-direction: reverse; border-color: rgba(65,174,227,.25); }
.cy-ring:nth-child(3) { inset: 36px; animation-duration: 5.5s; }
.cy-ring:nth-child(4) { inset: 54px; animation-duration: 4s;   animation-direction: reverse; border-color: rgba(65,174,227,.4); }
.cy-ring:nth-child(5) { inset: 70px; animation-duration: 2.8s; }
.cy-eye {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.cy-eye-inner { width: 24px; height: 24px; background: rgba(255,255,255,.08); border-radius: 50%; border: 1px solid rgba(255,255,255,.25); }
@keyframes cy-spin { to { transform: rotate(360deg); } }
.feat-tag {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--mn); font-size: 9px; color: var(--sky); letter-spacing: 2px; text-transform: uppercase; white-space: nowrap;
}

/* ══════════════════════════════════
   ABOUT
══════════════════════════════════ */
.about-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: start;
}
.about-txt p { font-size: 15px; color: var(--silver); line-height: 1.8; margin-bottom: 18px; }
.about-txt strong { color: var(--white); font-weight: 500; }
.mvv { display: flex; flex-direction: column; gap: 1px; margin-top: 36px; }
.mvv-card {
  background: var(--navy); padding: 22px 26px;
  border-left: 3px solid var(--accent); position: relative;
}
.mvv-card h4 {
  font-family: var(--hd); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px;
}
.mvv-card p { font-size: 13px; color: var(--silver); line-height: 1.6; }

/* pillars */
.pillar-box {
  background: var(--navy); border: 1px solid rgba(255,255,255,.07);
  border-radius: 7px; padding: 36px; margin-bottom: 28px;
}
.pil-title { font-family: var(--mn); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--silver); margin-bottom: 28px; display: flex; align-items: center; gap: 8px; }
.pil-title::before { content: ''; width: 16px; height: 1px; background: var(--silver); }
.pillar {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px; margin-bottom: 8px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.05); border-radius: 3px;
  transition: all .15s;
}
.pillar:hover { background: rgba(26,130,184,.07); border-color: rgba(26,130,184,.25); }
.pil-num { font-family: var(--mn); font-size: 9px; color: var(--accent); min-width: 20px; }
.pil-ico { font-size: 18px; }
.pil-inf { flex: 1; }
.pil-inf h5 { font-family: var(--hd); font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 2px; }
.pil-inf p  { font-size: 11px; color: var(--silver); }
.pil-bar-w { width: 56px; height: 3px; background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden; }
.pil-bar   { height: 100%; background: var(--accent); border-radius: 2px; }

/* timeline */
.timeline {
  border-left: 1px solid rgba(26,130,184,.2);
  padding-left: 26px;
  display: flex; flex-direction: column; gap: 0;
}
.tl-item { position: relative; padding-bottom: 24px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before {
